<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Application | Smart Lender</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/input.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="heading">

        <div class="logo">

            <i class="fa-solid fa-building-columns"></i>

            <span>Smart Lender</span>

        </div>

        <h2>Loan Application Form</h2>

        <p>
            Fill in the required details below to predict your loan eligibility.
        </p>

    </div>

    <form action="/submit" method="POST">

        <!-- Gender -->
        <div>
            <label><i class="fa-solid fa-user"></i> Gender</label>

            <select name="Gender" required>

                <option value="">Select Gender</option>

                <option value="0">Male</option>

                <option value="1">Female</option>

            </select>
        </div>

        <!-- Married -->
        <div>

            <label><i class="fa-solid fa-ring"></i> Married</label>

            <select name="Married" required>

                <option value="">Select</option>

                <option value="1">Yes</option>

                <option value="0">No</option>

            </select>

        </div>

        <!-- Dependents -->
        <div>

            <label><i class="fa-solid fa-children"></i> Dependents</label>

            <select name="Dependents" required>

                <option value="">Select</option>

                <option value="0">0</option>

                <option value="1">1</option>

                <option value="2">2</option>

                <option value="3">3+</option>

            </select>

        </div>

        <!-- Education -->
        <div>

            <label><i class="fa-solid fa-graduation-cap"></i> Education</label>

            <select name="Education" required>

                <option value="">Select</option>

                <option value="1">Graduate</option>

                <option value="0">Not Graduate</option>

            </select>

        </div>

        <!-- Self Employed -->
        <div>

            <label><i class="fa-solid fa-briefcase"></i> Self Employed</label>

            <select name="Self_Employed" required>

                <option value="">Select</option>

                <option value="1">Yes</option>

                <option value="0">No</option>

            </select>

        </div>

        <!-- Property Area -->
        <div>

            <label><i class="fa-solid fa-location-dot"></i> Property Area</label>

            <select name="Property_Area" required>

                <option value="">Select</option>

                <option value="0">Rural</option>

                <option value="1">Semi Urban</option>

                <option value="2">Urban</option>

            </select>

        </div>

        <!-- Applicant Income -->
        <div>

            <label><i class="fa-solid fa-wallet"></i> Applicant Income</label>

            <input
                type="number"
                name="ApplicantIncome"
                placeholder="Enter Applicant Income"
                required>

        </div>

        <!-- Co Applicant Income -->
        <div>

            <label><i class="fa-solid fa-hand-holding-dollar"></i> Co-Applicant Income</label>

            <input
                type="number"
                name="CoapplicantIncome"
                placeholder="Enter Co-Applicant Income"
                required>

        </div>

        <!-- Loan Amount -->
        <div>

            <label><i class="fa-solid fa-sack-dollar"></i> Loan Amount</label>

            <input
                type="number"
                name="LoanAmount"
                placeholder="Enter Loan Amount"
                required>

        </div>

        <!-- Loan Amount Term -->
        <div>

            <label><i class="fa-solid fa-calendar-days"></i> Loan Term</label>

            <input
                type="number"
                name="Loan_Amount_Term"
                placeholder="Enter Loan Term"
                required>

        </div>

        <!-- Credit History -->
        <div class="full">

            <label><i class="fa-solid fa-credit-card"></i> Credit History</label>

            <select name="Credit_History" required>

                <option value="">Select</option>

                <option value="1">Good (1)</option>

                <option value="0">Bad (0)</option>

            </select>

        </div>

        <div class="full" style="text-align:center;margin-top:20px;">

            <button class="btn" type="submit">

                <i class="fa-solid fa-magnifying-glass-chart"></i>

                Predict Loan Approval

            </button>

        </div>

    </form>

</div>

</body>

</html>
